classifier:
  name: CNN1D
  input_length: 2048
  num_classes: 5

cnn:
  channels: [32, 64, 128]
  kernel_size: 7
  use_batchnorm: true
  activation: ReLU
  pooling: MaxPool1d
  dropout: 0.3

train:
  optimizer: Adam
  lr: 0.001
  batch_size: 32
  epochs: 100
  weight_decay: 0.0001

eval:
  metrics:
    - accuracy
    - macro_f1
    - auc
    - precision
    - recall
    - confusion_matrix