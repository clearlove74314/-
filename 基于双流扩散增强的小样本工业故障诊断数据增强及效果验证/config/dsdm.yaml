model:
  name: DSDM
  input_length: 2048
  num_classes: 5
  feature_dim: 256
  semantic_dim: 256

feature_stream:
  conv_kernels: [3, 5, 9]
  channels: [64, 128, 256]
  use_channel_attention: true
  dropout: 0.1

semantic_stream:
  embedding_dim: 128
  mlp_dims: [128, 256, 256]
  label_smoothing: 0.1

cross_attention:
  num_heads: 4
  dim: 256
  dropout: 0.1
  use_layernorm: true
  use_residual: true

diffusion:
  timesteps: 200
  noise_schedule: cosine
  beta_start: 0.0001
  beta_end: 0.02

loss:
  lambda_cls: 0.1
  lambda_freq: 0.05

train:
  optimizer: AdamW
  lr: 0.0001
  weight_decay: 0.0001
  batch_size: 32
  pretrain_epochs: 300
  finetune_epochs: 30

generation:
  samples_per_class: 200